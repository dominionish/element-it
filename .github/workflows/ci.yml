name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  basic-checks:
    name: Basic checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Check Python syntax
        run: python -m compileall -q transcriber/app

      - name: Lint Python
        run: ruff check transcriber/app --select E9,F63,F7,F82

      - name: Validate CPU compose config
        run: docker compose -f docker-compose.cpu.yml --env-file .env.example config --quiet

      - name: Validate GPU compose config
        run: docker compose -f docker-compose.gpu.yml --env-file .env.example config --quiet

      - name: Validate production compose config
        run: docker compose -f docker-compose.prod.yml --env-file .env.example config --quiet

      - name: Check transcriber Dockerfile
        run: docker buildx build --check -f transcriber/Dockerfile transcriber

      - name: Check Planfix Dockerfile
        run: docker buildx build --check -f transcriber/Dockerfile.planfix transcriber

      - name: Check analysis Dockerfile
        run: docker buildx build --check -f transcriber/Dockerfile.analysis transcriber

  publish-image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: basic-checks
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
        (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        shell: bash
        run: |
          echo "transcriber=ghcr.io/${GITHUB_REPOSITORY,,}/transcriber" >> "$GITHUB_OUTPUT"
          echo "planfix=ghcr.io/${GITHUB_REPOSITORY,,}/planfix" >> "$GITHUB_OUTPUT"
          echo "analysis=ghcr.io/${GITHUB_REPOSITORY,,}/analysis" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: transcriber_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.transcriber }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push transcriber image
        uses: docker/build-push-action@v6
        with:
          context: transcriber
          file: transcriber/Dockerfile
          push: true
          tags: ${{ steps.transcriber_meta.outputs.tags }}
          labels: ${{ steps.transcriber_meta.outputs.labels }}
          cache-from: type=gha,scope=transcriber
          cache-to: type=gha,mode=max,scope=transcriber

      - name: Extract Planfix Docker metadata
        id: planfix_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.planfix }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Planfix image
        uses: docker/build-push-action@v6
        with:
          context: transcriber
          file: transcriber/Dockerfile.planfix
          push: true
          tags: ${{ steps.planfix_meta.outputs.tags }}
          labels: ${{ steps.planfix_meta.outputs.labels }}
          cache-from: type=gha,scope=planfix
          cache-to: type=gha,mode=max,scope=planfix

      - name: Extract analysis Docker metadata
        id: analysis_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.images.outputs.analysis }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=sha-${{ github.sha }}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push analysis image
        uses: docker/build-push-action@v6
        with:
          context: transcriber
          file: transcriber/Dockerfile.analysis
          push: true
          tags: ${{ steps.analysis_meta.outputs.tags }}
          labels: ${{ steps.analysis_meta.outputs.labels }}
          cache-from: type=gha,scope=analysis
          cache-to: type=gha,mode=max,scope=analysis
