name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: [self-hosted, windows, deploy]
    timeout-minutes: 60
    env:
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR || 'C:\services\n8n_whisper_transcriber' }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Deploy native Windows services
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:DEPLOY_DIR)) {
            throw "Set the DEPLOY_DIR repository variable, for example C:\services\n8n_whisper_transcriber"
          }

          & "$env:GITHUB_WORKSPACE\scripts\windows\deploy-native.ps1" `
            -SourceDir $env:GITHUB_WORKSPACE `
            -DeployDir $env:DEPLOY_DIR
