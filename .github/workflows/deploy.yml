name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy production
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: [self-hosted, windows, deploy]
    timeout-minutes: 60
    env:
      WSL_DISTRO: ${{ vars.WSL_DISTRO || 'Ubuntu' }}
      WSL_DEPLOY_DIR: ${{ vars.WSL_DEPLOY_DIR || '/opt/n8n_whisper_transcriber' }}
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
      REPOSITORY: ${{ github.repository }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout deployed revision
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Deploy with Docker in WSL
        shell: cmd
        run: >-
          powershell.exe -NoProfile -ExecutionPolicy Bypass
          -File "%GITHUB_WORKSPACE%\scripts\windows\deploy-docker.ps1"
          -SourceDir "%GITHUB_WORKSPACE%"
          -WslDistro "%WSL_DISTRO%"
          -WslDeployDir "%WSL_DEPLOY_DIR%"
          -DeploySha "%DEPLOY_SHA%"
          -Repository "%REPOSITORY%"
          -GhcrUsername "%GHCR_USERNAME%"
          -GhcrToken "%GHCR_TOKEN%"
