services:
  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:2.25.4}
    container_name: n8n_transcriber
    ports:
      - "${N8N_HOST_PORT:-5678}:5678"
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./data:/data
    restart: unless-stopped

  transcriber:
    image: ${TRANSCRIBER_LOCAL_IMAGE:-whisper_transcriber_api:local}
    build:
      context: ./transcriber
      args:
        BASE_IMAGE: ubuntu:22.04
        TORCH_VERSION: 2.7.1+cpu
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
    container_name: whisper_transcriber_api
    ports:
      - "${TRANSCRIBER_HOST_PORT:-7861}:7861"
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - DATA_DIR=/data
    volumes:
      - ./data:/data
      - ./models:/models
    restart: unless-stopped

  analysis:
    image: ${ANALYSIS_LOCAL_IMAGE:-meeting_analysis_service:local}
    build:
      context: ./transcriber
      dockerfile: Dockerfile.analysis
    container_name: meeting_analysis_service
    ports:
      - "${ANALYSIS_HOST_PORT:-7863}:7863"
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - DATA_DIR=/data
      - PROXYAPI_API_KEY=${PROXYAPI_API_KEY:-}
      - PROXYAPI_CHAT_COMPLETIONS_URL=${PROXYAPI_CHAT_COMPLETIONS_URL:-https://api.proxyapi.ru/openai/v1/chat/completions}
      - PROXYAPI_MODEL=${PROXYAPI_MODEL:-gpt-5-mini-2025-08-07}
      - PROXYAPI_TIMEOUT=${PROXYAPI_TIMEOUT:-600}
      - PROXYAPI_MAX_COMPLETION_TOKENS=${PROXYAPI_MAX_COMPLETION_TOKENS:-12000}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANALYSIS_MAX_TRANSCRIPT_CHARS=${ANALYSIS_MAX_TRANSCRIPT_CHARS:-1500000}
    volumes:
      - ./data:/data
    restart: unless-stopped

  planfix:
    image: ${PLANFIX_LOCAL_IMAGE:-planfix_transcriber_service:local}
    build:
      context: ./transcriber
      dockerfile: Dockerfile.planfix
    container_name: planfix_transcriber_service
    ports:
      - "${PLANFIX_HOST_PORT:-7862}:7862"
    environment:
      - TZ=${TZ:-Europe/Moscow}
      - DATA_DIR=/data
      - PLANFIX_TRANSCRIBER_URL=${PLANFIX_TRANSCRIBER_URL:-http://transcriber:7861}
      - PLANFIX_TRANSCRIBER_TIMEOUT=${PLANFIX_TRANSCRIBER_TIMEOUT:-30}
      - PLANFIX_ANALYSIS_URL=${PLANFIX_ANALYSIS_URL:-http://analysis:7863}
      - PLANFIX_ANALYSIS_TIMEOUT=${PLANFIX_ANALYSIS_TIMEOUT:-30}
      - PLANFIX_CREATE_ANALYSIS_JOBS=${PLANFIX_CREATE_ANALYSIS_JOBS:-true}
      - PLANFIX_RESULT_POLL_INTERVAL=${PLANFIX_RESULT_POLL_INTERVAL:-10}
      - PLANFIX_RESULT_MAX_POLLS=${PLANFIX_RESULT_MAX_POLLS:-720}
      - PLANFIX_AUDIO_EXTENSIONS=${PLANFIX_AUDIO_EXTENSIONS:-.mp3,.m4a,.wav,.ogg,.opus,.webm,.aac,.flac,.mp4,.mov,.mkv,.avi}
      - PLANFIX_CREATE_TRANSCRIBE_JOBS=${PLANFIX_CREATE_TRANSCRIBE_JOBS:-true}
      - PLANFIX_ALLOWED_FILE_URL_HOSTS=${PLANFIX_ALLOWED_FILE_URL_HOSTS:-planfix.ru,.planfix.ru}
      - PLANFIX_FILE_URL_TIMEOUT=${PLANFIX_FILE_URL_TIMEOUT:-120}
      - PLANFIX_TRANSCRIBE_MODEL=${PLANFIX_TRANSCRIBE_MODEL:-medium}
      - PLANFIX_RESULT_WEBHOOK_ID=${PLANFIX_RESULT_WEBHOOK_ID:-}
      - PLANFIX_RESULT_WEBHOOK_URL=${PLANFIX_RESULT_WEBHOOK_URL:-}
      - PLANFIX_RESULT_FILE_FIELD=${PLANFIX_RESULT_FILE_FIELD:-txt_file}
      - PLANFIX_ANALYSIS_FILE_FIELD=${PLANFIX_ANALYSIS_FILE_FIELD:-txt_file}
      - PLANFIX_RESULT_TIMEOUT=${PLANFIX_RESULT_TIMEOUT:-120}
      - PLANFIX_ALLOWED_RESULT_HOSTS=${PLANFIX_ALLOWED_RESULT_HOSTS:-planfix.ru,.planfix.ru}
    volumes:
      - ./data:/data
    depends_on:
      - transcriber
      - analysis
    restart: unless-stopped
